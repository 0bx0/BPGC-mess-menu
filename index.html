<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BPGC Mess Menu</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Roboto:wght@300;400;500&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=8">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000000">
    <link rel="icon" href="icon.png">
    <link rel="apple-touch-icon" href="icon.png">
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-DN5CMBJR69"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag() { dataLayer.push(arguments); }
        gtag('js', new Date());

        gtag('config', 'G-DN5CMBJR69');
    </script>
</head>

<body>
    <div class="bg-glow"></div>
    <div class="app-container">
        <header class="app-header">
            <h1 id="day-display">Loading...</h1>
            <p id="date-display" class="subtitle"></p>
        </header>

        <div class="controls">
            <button id="prev-day" class="nav-btn" aria-label="Previous Day">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M15 18l-6-6 6-6" />
                </svg>
            </button>
            <span class="current-view-label">Today</span>
            <button id="next-day" class="nav-btn" aria-label="Next Day">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M9 18l6-6-6-6" />
                </svg>
            </button>
        </div>

        <main id="menu-container">
            <!-- Menu items will be injected here -->
            <div class="loading-spinner"></div>
        </main>

        <div id="pwa-prompt" class="pwa-prompt" aria-hidden="true">
            <p>Get the App! 🚀</p>
            <button id="pwa-install-btn" class="pwa-btn">Install</button>
            <button id="pwa-close-btn" class="pwa-close-btn" aria-label="Close message">&times;</button>
        </div>

        <div id="pwa-modal" class="pwa-modal" aria-hidden="true">
            <div class="pwa-modal-content">
                <h2>Install Mess Menu App</h2>
                <p>Add this app to your device for quick access and offline use:</p>
                <ol>
                    <li>Tap the <strong>Share</strong> icon or browser menu.</li>
                    <li>Select <strong>Add to Home Screen</strong>.</li>
                </ol>
                <button id="pwa-modal-close" class="pwa-btn">Got it</button>
            </div>
        </div>

        <div id="update-notification" class="update-notification hidden">
            <p>New update available!</p>
            <button id="update-btn" class="update-btn">Update</button>
        </div>

        <div class="footer">
            <p>Developed with absolutely no love by Debraj Ghosh</p>
        </div>
    </div>
    <script src="script.js?v=3"></script>
</body>

</html>
